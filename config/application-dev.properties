##primary db (ใช้พารามิเตอร์ Hikari โดยตรง)
spring.datasource1.pool-name=mydb-1
spring.datasource1.jdbc-url=jdbc:firebird://localhost:3050/D:/javaDemo1/TESTHIBERNET.FDB?encoding=UTF8
spring.datasource1.username=SYSDBA
spring.datasource1.password=masterkey
spring.datasource1.driver-class-name=org.firebirdsql.jdbc.FBDriver
spring.datasource1.maximum-pool-size=3
spring.datasource1.minimum-idle=2
spring.datasource1.connection-timeout=30000
# Suitable for firebirdsql to tuning speed
spring.datasource1.auto-commit=false

##test db2
spring.datasource2.pool-name=mydb-2
spring.datasource2.jdbc-url=jdbc:firebird://localhost:3050/D:/javaDemo1/TESTHIBERNET.FDB?encoding=UTF8
spring.datasource2.username=SYSDBA
spring.datasource2.password=masterkey
spring.datasource2.driver-class-name=org.firebirdsql.jdbc.FBDriver
spring.datasource2.maximum-pool-size=4
spring.datasource2.minimum-idle=2
spring.datasource2.connection-timeout=30000
# Suitable for firebirdsql to tuning speed
spring.datasource2.auto-commit=false

